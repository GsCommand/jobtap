<!doctype html>
<!-- JobTap Dashboard v5 — every screen from the Screen Flow Board, one file, zero build.
     Nav (per flow board): Home · Jobs · Clients · Quotes · Campaigns · More
     More holds: Money, Texts, Setup wizard, Settings.
     Data: Supabase JS direct (RLS). Sends: engine API with user JWT.
     Photos: Supabase Storage bucket 'job-photos'. Proof card: client-side canvas. -->
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>JobTap</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--bg:#1a2e1a;--card:#fff;--primary:#2D6A22;--dark:#243d24;--money:#7bc67b;--r:18px;--muted:#5b6b5b}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#22301f;min-height:100vh}
a{color:inherit;text-decoration:none}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;color:#fff;max-width:960px;margin:0 auto}
#topbar b{font-size:19px}#topbar b span{color:var(--money)}
#main{max-width:960px;margin:0 auto;padding:0 14px 92px}
.card{background:var(--card);border-radius:var(--r);padding:18px;margin-bottom:14px;box-shadow:0 6px 24px rgba(0,0,0,.25)}
.card.dark{background:var(--dark);color:#fff}
h2{font-size:16.5px;margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.stat{background:var(--dark);color:#fff;border-radius:var(--r);padding:15px;text-align:center}
.stat .n{font-size:24px;font-weight:800;color:var(--money)}.stat .l{font-size:11px;color:rgba(255,255,255,.75);margin-top:4px}
.row{display:flex;justify-content:space-between;align-items:center;padding:11px 2px;border-bottom:1px solid #edf2ed;gap:10px}
.row:last-child{border-bottom:0}.row.click{cursor:pointer}
.t{font-weight:600;font-size:14.5px}.s{font-size:12.5px;color:var(--muted);margin-top:2px}
.pill{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap}
.p-green{background:#eef7ee;color:var(--primary)}.p-money{background:var(--money);color:#143014}
.p-gray{background:#eee;color:#555}.p-red{background:#fdecea;color:#b03a2e}.p-amber{background:#fef3e2;color:#9a6b1f}
button,.btn{background:var(--primary);color:#fff;border:0;border-radius:12px;padding:12px 16px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center}
button.sm{padding:8px 12px;font-size:13px}
button.ghost{background:#eef7ee;color:var(--primary)}
button.warn{background:#c0392b}
button:disabled{opacity:.55}
.wide{display:block;width:100%}
input,select,textarea{width:100%;border:1.5px solid #d7e2d7;border-radius:12px;padding:11px 12px;font-size:15px;background:#fbfdfb;font-family:inherit;outline:none;margin-bottom:10px}
input:focus,select:focus,textarea:focus{border-color:var(--primary);background:#fff}
label{display:block;font-size:12.5px;font-weight:700;margin-bottom:4px}
#nav{position:fixed;bottom:0;left:0;right:0;background:var(--dark);display:flex;justify-content:space-around;padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:50}
#nav a{color:rgba(255,255,255,.6);font-size:10px;font-weight:700;text-align:center;padding:6px 6px;border-radius:10px;min-width:48px}
#nav a.on{color:var(--money);background:rgba(123,198,123,.12)}
#nav a i{display:block;font-size:18px;font-style:normal;margin-bottom:2px}
.empty{text-align:center;color:var(--muted);padding:24px 10px;font-size:14px}
#toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:11px 18px;border-radius:12px;font-size:14px;display:none;z-index:99;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.hdr{display:flex;align-items:center;justify-content:space-between;margin:14px 0 10px;color:#fff;gap:8px;flex-wrap:wrap}
.hdr h1{font-size:19px}
.hdr .back{color:var(--money);font-size:13px;font-weight:700}
#login{max-width:400px;margin:8vh auto;padding:0 16px}
.msg-in,.msg-out{max-width:78%;padding:9px 13px;border-radius:14px;font-size:14px;margin:5px 0;line-height:1.4}
.msg-in{background:#eef2ee;margin-right:auto}.msg-out{background:var(--primary);color:#fff;margin-left:auto}
.mrow{display:flex;flex-direction:column}
.tabs{display:flex;gap:8px;margin-bottom:12px}
.tabs button{background:var(--dark);color:rgba(255,255,255,.7);padding:9px 16px;font-size:13px}
.tabs button.on{background:var(--money);color:#143014}
.bigbtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.bigbtns .btn{padding:16px 10px;font-size:14px}
.steps{display:flex;gap:6px;margin-bottom:16px}
.steps div{flex:1;height:5px;border-radius:99px;background:rgba(255,255,255,.2)}
.steps div.done{background:var(--money)}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin:8px 0}
.photo-grid img{width:100%;height:90px;object-fit:cover;border-radius:10px}
.photo-grid .ph{position:relative}.photo-grid .ph b{position:absolute;bottom:4px;left:4px;font-size:9px;background:rgba(0,0,0,.65);color:#fff;padding:2px 6px;border-radius:6px}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.actions button,.actions .btn{flex:1;min-width:130px}
canvas{display:none}
#map{height:62vh;border-radius:var(--r);margin-bottom:10px}
.mtotal{position:relative;background:var(--dark);color:#fff;border-radius:12px;padding:12px;text-align:center;font-weight:800;font-size:20px}
.mtotal small{display:block;font-size:11px;color:var(--money);font-weight:600}
@media(min-width:720px){#nav{position:sticky;top:0;bottom:auto;max-width:960px;margin:0 auto;border-radius:0 0 16px 16px}}
</style></head><body>
<div id="toast"></div><div id="app"></div><canvas id="cardCanvas" width="1200" height="630"></canvas>
<script>
const SB_URL='__SUPABASE_URL__',SB_KEY='__SUPABASE_ANON_KEY__';
const sb=window.supabase.createClient(SB_URL,SB_KEY);
let S={session:null,biz:null,cache:{}};
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money=n=>'$'+Number(n||0).toFixed(2);
const ago=d=>{if(!d)return'';const m=(Date.now()-new Date(d))/6e4;if(m<60)return Math.max(1,m|0)+'m';if(m<1440)return(m/60|0)+'h';return(m/1440|0)+'d'};
const fdate=d=>d?new Date(d).toLocaleDateString(undefined,{month:'short',day:'numeric'}):'—';
const fdt=d=>d?new Date(d).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):'—';
const daysUntil=d=>Math.ceil((new Date(d)-Date.now())/864e5);
const REASONS={a2p_pending:'A2P pending — texting is off',no_consent:'no SMS consent on file',opted_out:'customer opted out',quiet_hours:'quiet hours — will not send now',invalid_number:'invalid phone number'};
function toast(m){const t=$('#toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2600)}
async function api(path,opts={}){
  const r=await fetch(path,{...opts,headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.session.access_token,...(opts.headers||{})}});
  const j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j.error||('HTTP '+r.status));return j}
const setting=(k,d)=>((S.biz.settings||{})[k]??d);
async function saveSetting(k,v){const st={...(S.biz.settings||{}),[k]:v};
  const{error}=await sb.from('businesses').update({settings:st}).eq('id',S.biz.id);
  if(error){toast(error.message);return false}S.biz.settings=st;return true}
const q=t=>sb.from(t).select('*').eq('business_id',S.biz.id);
async function ensureClients(force){if(!S.cache.clients||force){const{data}=await q('clients').is('archived_at',null).order('first_name').limit(1000);S.cache.clients=data||[]}return S.cache.clients}
const clientName=c=>c?(c.first_name+' '+(c.last_name||'')).trim():'—';
const byId=list=>Object.fromEntries((list||[]).map(x=>[x.id,x]));

// ================= BOOT / LOGIN =================
(async()=>{const{data:{session}}=await sb.auth.getSession();S.session=session;
  sb.auth.onAuthStateChange((_e,s)=>{S.session=s;if(!s)renderLogin()});
  if(!session)return renderLogin();await loadBiz()})();
async function loadBiz(){
  const{data:biz}=await sb.from('businesses').select('*').eq('owner_id',S.session.user.id).limit(1).maybeSingle();
  if(!biz){$('#app').innerHTML='<div id="login"><div class="card"><h2>No business found</h2><p class="s" style="margin:8px 0">This account has no business attached yet.</p><button class="wide" onclick="createBiz()">Create my business</button><button class="wide ghost" style="margin-top:8px" onclick="sb.auth.signOut()">Sign out</button></div></div>';return}
  S.biz=biz;shell();window.addEventListener('hashchange',route);route();
}
window.createBiz=async()=>{
  const name=prompt('Business name?');if(!name)return;
  const{data,error}=await sb.from('businesses').insert({owner_id:S.session.user.id,name,plan:'trial'}).select().single();
  if(error)return toast(error.message);S.biz=data;shell();location.hash='#/setup';route();
};
function renderLogin(){
  $('#app').innerHTML=`<div id="login"><div style="text-align:center;color:#fff;font-size:26px;font-weight:800;margin-bottom:18px">Job<span style="color:var(--money)">Tap</span><div style="font-size:12px;font-weight:600;color:rgba(255,255,255,.6);margin-top:6px">Never miss another job</div></div>
  <div class="card"><div class="tabs"><button id="tb_in" class="on">Sign in</button><button id="tb_up">Create account</button></div>
  <label>Email</label><input id="li_e" type="email" autocomplete="email">
  <label>Password</label><input id="li_p" type="password">
  <button id="li_b" class="wide">Sign In</button>
  <div id="li_err" style="color:#b03a2e;font-size:13px;margin-top:10px;display:none"></div></div></div>`;
  let mode='in';
  $('#tb_in').onclick=()=>{mode='in';$('#tb_in').classList.add('on');$('#tb_up').classList.remove('on');$('#li_b').textContent='Sign In'};
  $('#tb_up').onclick=()=>{mode='up';$('#tb_up').classList.add('on');$('#tb_in').classList.remove('on');$('#li_b').textContent='Start Free Trial'};
  $('#li_b').onclick=async()=>{$('#li_b').disabled=true;
    const email=$('#li_e').value.trim(),password=$('#li_p').value;
    const{data,error}=mode==='in'?await sb.auth.signInWithPassword({email,password}):await sb.auth.signUp({email,password});
    if(error||!data.session){$('#li_err').textContent=error?error.message:'Check your email to confirm, then sign in.';$('#li_err').style.display='block';$('#li_b').disabled=false;return}
    S.session=data.session;await loadBiz()};
}

// ================= SHELL / ROUTER =================
const NAV=[['#/','⌂','Home'],['#/jobs','🗓','Jobs'],['#/clients','👥','Clients'],['#/quotes','📋','Quotes'],['#/campaigns','📣','Campaigns'],['#/more','⋯','More']];
function shell(){$('#app').innerHTML=`<div id="topbar"><b>Job<span>Tap</span></b><div style="text-align:right"><div style="font-size:12px;color:rgba(255,255,255,.7)">${esc(S.biz.name)}</div></div></div>
<div id="nav">${NAV.map(n=>`<a href="${n[0]}" data-h="${n[0]}"><i>${n[1]}</i>${n[2]}</a>`).join('')}</div><div id="main"></div>`}
function route(){
  const h=location.hash||'#/';
  document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('on',h===a.dataset.h||(a.dataset.h!=='#/'&&h.startsWith(a.dataset.h))));
  $('#main').innerHTML='<div class="empty">Loading…</div>';
  if(h.startsWith('#/client/'))return vClient(h.split('/')[2]);
  if(h.startsWith('#/lead/'))return vLead(h.split('/')[2]);
  if(h.startsWith('#/job/'))return vJob(h.split('/')[2]);
  if(h.startsWith('#/thread/'))return vThread(decodeURIComponent(h.split('/')[2]));
  if(h.startsWith('#/quote-new'))return vQuoteBuilder(new URLSearchParams(h.split('?')[1]||''));
  if(h.startsWith('#/measure'))return vMeasure(new URLSearchParams(h.split('?')[1]||''));
  ({'#/':vHome,'#/jobs':vJobs,'#/clients':vClients,'#/quotes':vQuotes,'#/campaigns':vCampaigns,'#/more':vMore,
    '#/leads':vLeads,'#/money':vMoney,'#/texts':vTexts,'#/settings':vSettings,'#/setup':vSetup,'#/due':vDue,'#/referrals':vReferrals}[h]||vHome)();
}

// ================= HOME (Needs Attention · Today · Stats · Quick Add) =================
async function vHome(){
  await ensureClients();
  const t0=new Date();t0.setHours(0,0,0,0);const t1=new Date(+t0+864e5);
  const monthStart=new Date();monthStart.setDate(1);monthStart.setHours(0,0,0,0);
  const [jobs,mc,unpaid,leads,oq,fus,paidMo,appr,jobsFromQuotes]=await Promise.all([
    q('jobs').gte('scheduled_at',t0.toISOString()).lt('scheduled_at',t1.toISOString()).order('scheduled_at'),
    q('missed_calls').gte('created_at',new Date(Date.now()-7*864e5).toISOString()),
    q('invoices').in('status',['sent','partial','viewed']),
    q('leads').in('status',['new','contacted']).order('created_at',{ascending:false}).limit(5),
    q('quotes').eq('status','sent'),
    q('followup_steps').eq('status','pending').lte('due_at',new Date(Date.now()+7*864e5).toISOString()).order('due_at').limit(20),
    q('invoices').eq('status','paid').gte('paid_at',monthStart.toISOString()),
    q('quotes').in('status',['approved','accepted']),
    q('jobs').not('quote_id','is',null)
  ]);
  const cm=byId(S.cache.clients);
  const owed=(unpaid.data||[]).reduce((s,i)=>s+Number(i.total)-Number(i.amount_paid||0),0);
  const openQ=(oq.data||[]).reduce((s,x)=>s+Number(x.total||0),0);
  const moTotal=(paidMo.data||[]).reduce((s,x)=>s+Number(x.total||0),0);
  const overdue=(unpaid.data||[]).filter(i=>i.due_at&&new Date(i.due_at)<new Date());
  const dueSteps=(fus.data||[]).filter(f=>['d90_rebook','d180_seasonal','d365_annual'].includes(f.step_key));
  const scheduledQuoteIds=new Set((jobsFromQuotes.data||[]).map(j=>j.quote_id));
  const needsSched=(appr.data||[]).filter(x=>!scheduledQuoteIds.has(x.id));
  const reviewsDue=(fus.data||[]).filter(f=>f.step_key==='d3_review');
  const b=S.biz;
  const checks=[['Business profile',!!(b.name&&b.phone)],['Twilio number',!!b.twilio_number],['A2P approved',b.a2p_status==='approved'],['Review link',!!b.review_link_google||!!b.review_link_facebook]];
  $('#main').innerHTML=`
  <div class="hdr"><h1>Today</h1><span style="font-size:12px;color:var(--money)">${money(moTotal)} this month · ${(paidMo.data||[]).length} paid jobs</span></div>
  <div class="bigbtns">
    <a class="btn" href="#/leads" onclick="setTimeout(addLead,150)">+ Add Lead</a>
    <a class="btn" href="#/quote-new">+ Send Quote</a>
    <a class="btn" href="#/jobs" onclick="setTimeout(addJob,150)">+ Schedule Job</a>
    <a class="btn" href="#/texts">Text a Customer</a>
  </div>
  <div class="grid" style="margin-bottom:14px">
    <div class="stat"><div class="n">${(jobs.data||[]).length}</div><div class="l">JOBS TODAY</div></div>
    <div class="stat"><div class="n">${(mc.data||[]).length}</div><div class="l">CALLS CAUGHT · 7D</div></div>
    <div class="stat"><div class="n">${money(openQ)}</div><div class="l">OPEN QUOTES</div></div>
    <div class="stat"><div class="n">${money(owed)}</div><div class="l">UNPAID</div></div>
  </div>
  ${(overdue.length||reviewsDue.length||dueSteps.length||needsSched.length)?`<div class="card"><h2>⚠️ Needs attention</h2>
    ${needsSched.map(x=>`<div class="row"><div><div class="t">${money(x.total)} quote APPROVED — ${esc(clientName(cm[x.client_id]))}</div><div class="s">Needs scheduling</div></div><button class="sm" onclick="quoteToJob('${x.id}')">Schedule job</button></div>`).join('')}
    ${overdue.map(i=>`<div class="row"><div><div class="t">${money(Number(i.total)-Number(i.amount_paid||0))} overdue — ${esc(clientName(cm[i.client_id]))}</div><div class="s">Invoice · due ${fdate(i.due_at)}</div></div><button class="sm warn" onclick="sendThing('invoice','${i.id}')">Resend</button></div>`).join('')}
    ${reviewsDue.map(f=>`<div class="row"><div><div class="t">Review request due — ${esc(clientName(cm[f.client_id]))}</div><div class="s">Sends automatically ${fdate(f.due_at)}</div></div><span class="pill p-green">AUTO</span></div>`).join('')}
    ${dueSteps.map(f=>`<div class="row"><div><div class="t">${esc(clientName(cm[f.client_id]))} due back</div><div class="s">${esc(f.step_key.replace(/_/g,' '))} · ${fdate(f.due_at)}</div></div><span class="pill p-amber">DUE</span></div>`).join('')}
  </div>`:''}
  <div class="card"><h2>Today's jobs</h2>${(jobs.data||[]).map(j=>`<div class="row click" onclick="location.hash='#/job/${j.id}'"><div><div class="t">${esc(j.title||'Job')}</div><div class="s">${esc(clientName(cm[j.client_id]))} · ${fdt(j.scheduled_at)}</div></div><span class="pill p-green">${esc(j.status.toUpperCase())}</span></div>`).join('')||'<div class="empty">Nothing scheduled today.</div>'}</div>
  <div class="card"><h2>New leads</h2>${(leads.data||[]).map(l=>`<div class="row click" onclick="location.hash='#/lead/${l.id}'"><div><div class="t">${esc(l.name||l.phone)}</div><div class="s">${esc(l.service_requested||'')} · ${ago(l.created_at)} ago</div></div><span class="pill ${l.source==='missed_call'?'p-money':'p-green'}">${esc((l.source||'').replace('_',' ').toUpperCase())}</span></div>`).join('')||'<div class="empty">No open leads.</div>'}</div>
  ${checks.some(c=>!c[1])?`<div class="card"><h2>Setup checklist</h2>${checks.map(c=>`<div class="row"><div class="t">${c[1]?'✅':'⬜'} ${c[0]}</div></div>`).join('')}<div class="s" style="margin-top:8px">Finish in <a href="#/setup" style="color:var(--primary);font-weight:700">Setup</a>.</div></div>`:''}
  ${b.a2p_status!=='approved'?'<div class="card" style="background:#fdecea"><b style="color:#b03a2e">Texting is OFF</b><div class="s" style="margin-top:4px">A2P registration not approved — all outbound SMS is blocked until it is.</div></div>':''}`;
}

// ================= LEADS (list · detail · status · convert) =================
async function vLeads(){
  const{data:leads}=await q('leads').is('archived_at',null).order('created_at',{ascending:false}).limit(100);
  const{data:mcs}=await q('missed_calls').order('created_at',{ascending:false}).limit(30);
  $('#main').innerHTML=`<div class="hdr"><h1>Leads</h1><button class="sm" onclick="addLead()">+ Add Lead</button></div>
  <div class="card">${(leads||[]).map(l=>`<div class="row click" onclick="location.hash='#/lead/${l.id}'"><div><div class="t">${esc(l.name||l.phone)}</div><div class="s">${esc(l.phone||'')} · ${esc(l.service_requested||'—')} · ${ago(l.created_at)} ago</div></div><span class="pill ${{new:'p-green',contacted:'p-amber',quoted:'p-amber',booked:'p-money',lost:'p-gray'}[l.status]||'p-gray'}">${esc((l.status||'new').toUpperCase())}</span></div>`).join('')||'<div class="empty">No leads yet — share your quote form.</div>'}
  <div class="s" style="margin-top:10px;word-break:break-all">Quote form: <b>${location.origin}/q/${S.biz.id}</b></div></div>
  <div class="card"><h2>Missed calls</h2>${(mcs||[]).map(m=>`<div class="row"><div><div class="t">${esc(m.caller_number)}</div><div class="s">${ago(m.created_at)} ago</div></div><span class="pill ${m.text_back_sent?'p-money':'p-gray'}">${m.text_back_sent?'TEXTED BACK':'NO TEXT'}</span></div>`).join('')||'<div class="empty">None captured yet.</div>'}</div>`;
}
window.addLead=async()=>{
  const name=prompt('Lead name?');if(!name)return;
  const phone=prompt('Phone?')||null;const svc=prompt('Service requested?')||null;
  const{data,error}=await sb.from('leads').insert({business_id:S.biz.id,name,phone,service_requested:svc,source:'manual',status:'new'}).select().single();
  if(error)return toast(error.message);location.hash='#/lead/'+data.id;
};
const LEAD_STATUSES=['new','contacted','quoted','booked','lost'];
async function vLead(id){
  const{data:l}=await sb.from('leads').select('*').eq('id',id).single();
  if(!l)return $('#main').innerHTML='<div class="empty">Not found</div>';
  $('#main').innerHTML=`<div class="hdr"><h1>${esc(l.name||l.phone)}</h1><a class="back" href="#/leads">← leads</a></div>
  <div class="card">
    <div class="s">${esc(l.phone||'no phone')} · ${esc(l.service_requested||'')} · via ${esc(l.source)}</div>
    ${l.message?`<div class="s" style="margin-top:6px">"${esc(l.message)}"</div>`:''}
    ${l.address?`<div class="s" style="margin-top:6px">📍 ${esc(l.address)}</div>`:''}
    <div class="actions">
      ${l.phone?`<a class="btn" href="tel:${esc(l.phone)}">Call</a><a class="btn ghost" href="#/thread/${encodeURIComponent(l.phone)}">Text</a>`:''}
      <button class="ghost" onclick="convertLead('${l.id}')">Convert to Quote</button>
      <button class="warn" onclick="archiveLead('${l.id}')">Archive</button>
    </div>
    <label style="margin-top:14px">Status</label>

async function compressImg(file,maxW=1600,q=0.8){
  const url=URL.createObjectURL(file);
  const img=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=url});
  URL.revokeObjectURL(url);
  const scale=Math.min(1,maxW/img.width);
  const cv=document.createElement('canvas');cv.width=Math.round(img.width*scale);cv.height=Math.round(img.height*scale);
  cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
  return new Promise(res=>cv.toBlob(res,'image/jpeg',q));
}

  const photos=Array.isArray(j.photos)?j.photos:[];
  for(const f of files){
    const blob=await compressImg(f).catch(()=>f); // fall back to original if decode fails
    const path=`${S.biz.id}/${jobId}/${kind}-${Date.now()}-${Math.random().toString(36).slice(2,7)}.jpg`;
    const{error}=await sb.storage.from('job-photos').upload(path,blob,{contentType:'image/jpeg'});
    if(error){toast('Upload failed: '+error.message);return}
    const{data:pub}=sb.storage.from('job-photos').getPublicUrl(path);
    photos.push({kind,url:pub.publicUrl});
  }
  const{error}=await sb.from('jobs').update({photos}).eq('id',jobId);
  if(error)return toast(error.message);toast('Photos saved ✓');vJob(jobId);
};
window.proofCard=async jobId=>{
  const{data:j}=await sb.from('jobs').select('*').eq('id',jobId).single();
  const c=byId(await ensureClients())[j.client_id];
  const photos=j.photos||[];
  const b=photos.filter(p=>p.kind==='before').pop(),a=photos.filter(p=>p.kind==='after').pop();
  if(!b||!a)return toast('Need a before and an after photo');
  toast('Building proof card…');
  const load=u=>new Promise((res,rej)=>{const i=new Image();i.crossOrigin='anonymous';i.onload=()=>res(i);i.onerror=rej;i.src=u});
  try{
    const[bi,ai]=await Promise.all([load(b.url),load(a.url)]);
    const cv=$('#cardCanvas'),x=cv.getContext('2d');const W=1200,H=630,ph=520;
    x.fillStyle='#fff';x.fillRect(0,0,W,H);
    const draw=(img,dx)=>{const s=Math.max(600/img.width,ph/img.height);const w=img.width*s,h=img.height*s;
      x.save();x.beginPath();x.rect(dx,0,600,ph);x.clip();x.drawImage(img,dx+(600-w)/2,(ph-h)/2,w,h);x.restore()};
    draw(bi,0);draw(ai,600);
    x.fillStyle='rgba(0,0,0,.7)';x.fillRect(20,ph-52,150,36);x.fillRect(620,ph-52,130,36);
    x.fillStyle='#fff';x.font='bold 22px sans-serif';x.fillText('BEFORE',38,ph-27);x.fillText('AFTER',640,ph-27);

let MZ={map:null,pts:[],poly:null,marks:[],prop:null};
async function loadLeaflet(){
  if(window.L)return;
  await new Promise(res=>{const l=document.createElement('link');l.rel='stylesheet';l.href='https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css';document.head.appendChild(l);
    const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js';s.onload=res;document.head.appendChild(s)});
}
window.openMeasure=async()=>{
  const cid=$('#qb_client')?$('#qb_client').value:null;
  if(!cid)return toast('Pick a client first');
  const{data:props}=await sb.from('properties').select('*').eq('client_id',cid);
  let prop=(props||[])[0];
  if((props||[]).length>1){const pick=prompt('Which property?\n'+props.map((p,i)=>(i+1)+'. '+p.address).join('\n'),'1');if(pick===null)return;prop=props[(Number(pick)||1)-1]}
  if(!prop){const addr=prompt('No property on file. Address to measure?');if(!addr)return;
    const{data,error}=await sb.from('properties').insert({business_id:S.biz.id,client_id:cid,address:addr}).select().single();
    if(error)return toast(error.message);prop=data}
  MZ.prop=prop;
  // Reuse a saved measurement?
  const saved=Array.isArray(prop.saved_measurements)?prop.saved_measurements:[];
  if(saved.length){
    const pick=prompt('Saved measurements:\n'+saved.map((m,i)=>(i+1)+'. '+m.label+' \u2014 '+Math.round(m.area_sqft).toLocaleString()+' sq ft').join('\n')+'\n\nEnter number to use, or 0 to measure new:','0');
    if(pick===null)return;
    const m=saved[(Number(pick)||0)-1];
    if(m){$('#qb_sqft').value=Math.round(m.area_sqft);return toast('Using '+m.label+' \u2713')}
  }
  toast('Loading satellite view\u2026');await loadLeaflet();
  // Geocode: stored lat/lng first, else Nominatim
  let lat=prop.lat,lng=prop.lng;
  if(!lat||!lng){
    try{const r=await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(prop.address));
      const j=await r.json();if(j[0]){lat=+j[0].lat;lng=+j[0].lon;
        await sb.from('properties').update({lat,lng}).eq('id',prop.id)}}catch(e){}
  }
  if(!lat||!lng){lat=30.1975;lng=-81.3925;toast('Address not found \u2014 pan to the property')} // Nocatee-ish default
  const ov=document.createElement('div');ov.id='mz_ov';
  ov.style.cssText='position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column';
  ov.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;color:#fff">
    <b>\ud83d\udccf Tap corners of the area</b><button class="sm warn" onclick="closeMeasure()">\u2715 Close</button></div>
    <div id="mz_map" style="flex:1"></div>
    <div style="padding:12px 16px;background:var(--dark);display:flex;gap:8px;align-items:center">
      <div style="color:#fff;flex:1"><b id="mz_area" style="color:var(--money);font-size:20px">0</b> <span style="font-size:12px">sq ft</span></div>
      <button class="sm ghost" onclick="mzUndo()">Undo</button><button class="sm ghost" onclick="mzClear()">Clear</button>
      <button class="sm" onclick="mzSave()">Save & use \u2192</button></div>`;
  document.body.appendChild(ov);
  MZ.pts=[];MZ.marks=[];MZ.poly=null;
  MZ.map=L.map('mz_map',{zoomControl:true}).setView([lat,lng],20);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:21,maxNativeZoom:19,attribution:'Esri'}).addTo(MZ.map);
  MZ.map.on('click',e=>{MZ.pts.push(e.latlng);
    MZ.marks.push(L.circleMarker(e.latlng,{radius:5,color:'#7bc67b',fillColor:'#7bc67b',fillOpacity:1}).addTo(MZ.map));
    mzRedraw()});
};
function mzArea(pts){ // planar shoelace on local-meter projection \u2014 fine at parcel scale
  if(pts.length<3)return 0;
  const R=6378137,lat0=pts[0].lat*Math.PI/180;
  const xy=pts.map(p=>[R*p.lng*Math.PI/180*Math.cos(lat0),R*p.lat*Math.PI/180]);
  let s=0;for(let i=0;i<xy.length;i++){const[x1,y1]=xy[i],[x2,y2]=xy[(i+1)%xy.length];s+=x1*y2-x2*y1}
  return Math.abs(s/2)*10.7639; // m\u00b2 \u2192 sq ft
}
function mzRedraw(){
  if(MZ.poly)MZ.map.removeLayer(MZ.poly);
  if(MZ.pts.length>=2)MZ.poly=L.polygon(MZ.pts,{color:'#7bc67b',weight:2,fillOpacity:.25}).addTo(MZ.map);
  $('#mz_area').textContent=Math.round(mzArea(MZ.pts)).toLocaleString();
}
window.mzUndo=()=>{MZ.pts.pop();const m=MZ.marks.pop();if(m)MZ.map.removeLayer(m);mzRedraw()};
window.mzClear=()=>{MZ.pts=[];MZ.marks.forEach(m=>MZ.map.removeLayer(m));MZ.marks=[];mzRedraw()};
window.closeMeasure=()=>{if(MZ.map){MZ.map.remove();MZ.map=null}const o=$('#mz_ov');if(o)o.remove()};
window.mzSave=async()=>{
  const area=mzArea(MZ.pts);
  if(area<10)return toast('Trace at least 3 corners first');
  const label=prompt('Label this area:','Driveway')||'Area';
  const saved=Array.isArray(MZ.prop.saved_measurements)?MZ.prop.saved_measurements:[];
  saved.push({label,area_sqft:Math.round(area),type:'polygon',measured_at:new Date().toISOString(),points:MZ.pts.map(p=>[+p.lat.toFixed(7),+p.lng.toFixed(7)])});
  const{error}=await sb.from('properties').update({saved_measurements:saved}).eq('id',MZ.prop.id);
  if(error)return toast(error.message);
  const el=$('#qb_sqft');if(el)el.value=Math.round(area);
  closeMeasure();toast(label+': '+Math.round(area).toLocaleString()+' sq ft \u2713 saved & filled');
};

function parseCsv(text){const rows=[];let row=[],f='',inQ=false;const src=text.replace(/^\uFEFF/,'');
  for(let i=0;i<src.length;i++){const c=src[i];
    if(inQ){if(c==='"'){if(src[i+1]==='"'){f+='"';i++}else inQ=false}else f+=c}
    else if(c==='"')inQ=true;else if(c===','){row.push(f);f=''}
    else if(c==='\n'||c==='\r'){if(c==='\r'&&src[i+1]==='\n')i++;row.push(f);f='';if(row.some(x=>x.trim()))rows.push(row);row=[]}
    else f+=c}
  if(f!==''||row.length){row.push(f);if(row.some(x=>x.trim()))rows.push(row)}return rows}
const normPhone=r=>{if(!r)return null;let s=String(r).trim().replace(/\s*(x|ext\.?)\s*\d+$/i,'');const plus=s.startsWith('+');const d=s.replace(/\D/g,'');
  if(plus)return d.length===11&&d[0]==='1'?'+'+d:null;if(d.length===10)return'+1'+d;if(d.length===11&&d[0]==='1')return'+'+d;return null};
window.swImport=async file=>{
  if(!file)return;const rows=parseCsv(await file.text());
  if(rows.length<2)return $('#sw_imp').textContent='CSV needs a header + rows.';
  const h=rows[0].map(x=>x.trim().toLowerCase().replace(/\s+/g,'_'));const col=n=>h.indexOf(n);
  let ok=0,bad=0,dupe=0;const seen=new Set();const now=new Date().toISOString();
  $('#sw_imp').textContent='Importing…';
  for(const r of rows.slice(1)){
    const g=n=>col(n)>=0?(r[col(n)]||'').trim():'';
    let first=g('first_name'),last=g('last_name');
    if(!first&&g('name')){const p=g('name').split(/\s+/);first=p[0];last=p.slice(1).join(' ')}
    const phone=normPhone(g('phone'));if(!phone){bad++;continue}
    if(seen.has(phone)){dupe++;continue}seen.add(phone);
    const{data:c,error}=await sb.from('clients').insert({business_id:S.biz.id,first_name:first||'Client',last_name:last||null,phone,email:g('email')||null,sms_consent:true,sms_consent_source:'import_attested',sms_consent_at:now,source:'csv_import'}).select().single();
    if(error){bad++;continue}
    if(g('address'))await sb.from('properties').insert({business_id:S.biz.id,client_id:c.id,address:g('address')});
    ok++;$('#sw_imp').textContent=`Imported ${ok}…`;
  }
  await ensureClients(true);
  $('#sw_imp').innerHTML=`<b>✓ ${ok} imported</b>${bad?` · ${bad} skipped (bad phone)`:''}${dupe?` · ${dupe} duplicates`:''}`;
};

    <div style="display:flex;gap:8px"><input id="m_addr" placeholder="Property address" value="${esc(addr)}" style="margin:0"><button class="sm" onclick="mGeocode()">Find</button></div>
    <div id="map" style="margin-top:10px"></div>
    <div class="mtotal"><span id="m_area">0</span> sq ft<small>Tap corners of the paver area · double-tap to close</small></div>
    <div class="actions">
      <button class="ghost" onclick="mUndo()">↩ Undo point</button>
      <button class="ghost" onclick="mClear()">Clear</button>
      <button onclick="mUse('${clientId}','${ret}','${prop?prop.id:''}')">✓ Use this measurement</button>
    </div>
  </div>`;
  M={pts:[],layer:null,map:null};
  const map=L.map('map',{doubleClickZoom:false}).setView([prop&&prop.lat?prop.lat:30.1,prop&&prop.lng?prop.lng:-81.4],prop&&prop.lat?20:11);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    {maxZoom:21,maxNativeZoom:19,attribution:'Esri, Maxar, Earthstar Geographics'}).addTo(map);
  M.map=map;
  map.on('click',e=>{M.pts.push([e.latlng.lat,e.latlng.lng]);mDraw()});
  if(addr&&!(prop&&prop.lat))mGeocode();
}
window.mGeocode=async()=>{
  const q=$('#m_addr').value.trim();if(!q)return;
  try{const r=await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(q));
    const j=await r.json();if(!j.length)return toast('Address not found');
    M.map.setView([+j[0].lat,+j[0].lon],20)}catch(e){toast('Geocode failed — pan manually')}
};
function mArea(pts){ // shoelace on a local equirectangular projection — fine at parcel scale
  if(pts.length<3)return 0;
  const R=6378137,lat0=pts[0][0]*Math.PI/180;
  const xy=pts.map(p=>[R*(p[1]*Math.PI/180)*Math.cos(lat0),R*(p[0]*Math.PI/180)]);
  let s=0;for(let i=0;i<xy.length;i++){const[x1,y1]=xy[i],[x2,y2]=xy[(i+1)%xy.length];s+=x1*y2-x2*y1}
  return Math.abs(s/2)*10.7639; // m² → sq ft
}
function mDraw(){
  if(M.layer)M.map.removeLayer(M.layer);
  if(M.pts.length)M.layer=L.polygon(M.pts,{color:'#7bc67b',weight:3,fillOpacity:.25}).addTo(M.map);
  $('#m_area').textContent=Math.round(mArea(M.pts)).toLocaleString();
}
window.mUndo=()=>{M.pts.pop();mDraw()};
window.mClear=()=>{M.pts=[];mDraw()};
window.mUse=async(clientId,ret,propId)=>{
  const area=Math.round(mArea(M.pts));
  if(area<10)return toast('Trace the area first — tap the corners');
  if(propId){ // save onto the property for next time
    const{data:p}=await sb.from('properties').select('saved_measurements,lat,lng').eq('id',propId).single();
    const sm=Array.isArray(p.saved_measurements)?p.saved_measurements:[];
    sm.push({label:'Satellite trace',area_sqft:area,type:'polygon',measured_at:new Date().toISOString()});
    const ctr=M.pts.length?M.pts.reduce((a,b)=>[a[0]+b[0]/M.pts.length,a[1]+b[1]/M.pts.length],[0,0]):[null,null];
    await sb.from('properties').update({saved_measurements:sm,lat:p.lat||ctr[0],lng:p.lng||ctr[1]}).eq('id',propId);
  }
  toast(area.toLocaleString()+' sq ft saved ✓');
  if(ret==='quote'){sessionStorage.setItem('measured_sqft',String(area));location.hash='#/quote-new?client='+clientId}
  else location.hash=clientId?'#/client/'+clientId:'#/clients';
};

    return `<div class="row"><div class="t">${l}</div><input type="checkbox" data-nk="${k}" ${on?'checked':''} style="width:auto" onchange="saveNotif()"></div>`}).join('')}

window.saveSocial=async()=>{

window.saveNotif=async()=>{

window.saveSettings=async()=>{

};
window.editTpl=async id=>{const t=S.cache.tpls.find(x=>x.id===id);if(!t)return;
  const body=prompt('Edit "'+t.key+'" — {braces} auto-fill:',t.body);if(body===null||body===t.body)return;
  const{error}=await sb.from('message_templates').update({body}).eq('id',id);
  if(error)return toast(error.message);toast('Updated ✓');vSettings()};
