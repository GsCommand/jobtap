name: tests
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      # fake creds so the engine modules load; nothing external is called in tests
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_SERVICE_KEY: test
      TWILIO_ACCOUNT_SID: ACtest
      TWILIO_AUTH_TOKEN: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci || npm install
      - name: Unit tests (compliance gates, phone, STOP/START, send path)
        run: npm test
      - name: DB integration tests (schema, trigger, delay setting, Stripe dedup, migration idempotency)
        run: npm run test:db
